<h1 class="titulo-anime">{{ animeSelecionado?.title }}</h1>

<main class="main-container">
  @if (animeSelecionado) {
    <div class="content-wrapper">

      <div class="cotainer-image-anime">
        <img class="image-src" [src]="animeSelecionado?.images?.jpg?.image_url" alt="capa do anime">
      </div>

      <div class="container-info-anime">
        <h2 class="title-anime-small">{{ animeSelecionado?.title }}</h2>

        <div class="div-synopis">
          <span class="titile-synopsis">synopsis</span>
          <p class="synopse">{{ animeSelecionado?.synopsis }}</p>
        </div>
      </div>

    </div>
  } @else {



    <div class="loading-container">

      <div class="loading-container">
        <img src="https://media1.tenor.com/m/Nys6GH_P9fAAAAAC/umamusume-loading.gif"
       alt="Carregando..."
       class="gif-loading">
      </div>

      <div class="animation-wrapper">

        <div class="dot-runner"></div>
        <div class="dot-runner"></div>
        <div class="dot-runner"></div>
      </div>
    <div class="loading-container">
      <p class="loading">Buscando dados no servidor Java...</p>
    </div>
    </div>
  }
</main>

<div class="div-button-back">
  <button (click)="voltarParaHome()">Voltar</button>
</div>
