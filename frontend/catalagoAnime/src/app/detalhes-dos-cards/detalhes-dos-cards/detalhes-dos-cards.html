<h1 class="titulo-anime"> {{ animeSelecionado?.data?.title}}</h1> <!-- aqui usamos o operador de navegação segura para evitar erros caso o animeSelecionado seja null ou undefined, o ponto de interrogação é para verificar se o animeSelecionado existe antes de tentar acessar a propriedade title, caso não exista ele retorna undefined e não da erro -->
<div>
  <span class="titile-synopsis">synopisi</span>
  <p class="synopse" > {{ animeSelecionado?.synopsis}}</p>
</div>

<main class="main-container">
  @if (animeSelecionado) {
    <div  class="cotainer-image-anime" >
    <img class="image-src" [src]="animeSelecionado?.data?.images?.jpg?.image_url" alt="capa do anime"> <!-- aqui usamos o operador de navegação segura para evitar erros caso o animeSelecionado seja null ou undefined, o ponto de interrogação é para verificar se o animeSelecionado existe antes de tentar acessar a propriedade data, images, jpg e image_url, caso não exista ele retorna undefined e não da erro -->
    <h2 class="title-anime-small">{{ animeSelecionado?.data?.title}}</h2>
  </div>
  }@else {
    <p class="loading">buscando dados no servidos java</p>
  }
</main>

<div class="div-button-back">
<button (click)="voltarParaHome()">Voltar</button>
</div>
